name: lint

# Python compile + unit tests via the shared skill-repo-skill reusable.
# The reusable provides no interpreter of its own (no setup-python, no
# `uv python install`), so the test command consumes the matrix value
# explicitly via `uv run --python "$PYTHON_VERSION"`.
#
# Shell, YAML, Markdown, ruff and workflow linting for this repo run in
# .github/workflows/validate.yml (netresearch/skill-repo-skill validate.yml),
# which already ShellChecks every *.sh at -S error and schema-validates
# skills/retro/checkpoints.yaml.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

permissions: {}

jobs:
  test:
    name: Python
    # Union of the called workflow's job permissions (bandit, test): contents: read.
    uses: netresearch/skill-repo-skill/.github/workflows/ci-python.yml@main
    permissions:
      contents: read
    with:
      test-command: |
        uv run --python "$PYTHON_VERSION" python -m py_compile skills/retro/scripts/*.py
        uv run --python "$PYTHON_VERSION" python -m unittest discover -s tests -v
