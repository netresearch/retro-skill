version: 1
skill_id: retro

preconditions:
  - type: command
    pattern: "python3 --version"
    desc: "python3 available for mechanical pre-pass"

mechanical:
  - id: RT-01
    type: file_exists
    target: skills/retro/SKILL.md
    severity: error
    desc: "SKILL.md exists"

  - id: RT-02
    type: file_exists
    target: commands/retro.md
    severity: error
    desc: "/retro command definition exists"

  - id: RT-03
    type: file_exists
    target: skills/retro/scripts/detect-mechanical.py
    severity: error
    desc: "Mechanical pre-pass script exists"

  - id: RT-04
    type: command
    pattern: "python3 -m py_compile skills/retro/scripts/detect-mechanical.py"
    severity: error
    desc: "Mechanical pre-pass script is syntactically valid Python"

  - id: RT-05
    type: file_exists
    target: skills/retro/scripts/find-installed-skills.sh
    severity: error
    desc: "Skill discovery helper exists"

  - id: RT-07
    type: command
    pattern: "python3 -m unittest discover -s tests -q"
    severity: error
    desc: "Detector test suite passes (guards A1/A14 signal regressions)"

  - id: RT-06
    type: command
    pattern: "bash -n skills/retro/scripts/find-installed-skills.sh"
    severity: error
    desc: "Skill discovery script is syntactically valid bash"

  - id: RT-10
    type: file_exists
    target: "{skills/retro/references/friction-catalog.md,skills/retro/references/destination-taxonomy.md,skills/retro/references/classification-heuristic.md}"
    severity: error
    desc: "Core reference docs exist (catalog, taxonomy, heuristic)"

  - id: RT-11
    type: file_exists
    target: "{skills/retro/references/skill-discovery.md,skills/retro/references/patch-workflow.md,skills/retro/references/workflow.md}"
    severity: error
    desc: "Workflow reference docs exist (discovery, patch, workflow)"

  - id: RT-20
    type: file_exists
    target: hooks/session-end.json
    severity: warning
    desc: "Optional SessionEnd hook template provided"

  - id: RT-21
    type: command
    pattern: "jq -e . hooks/session-end.json > /dev/null"
    severity: error
    desc: "SessionEnd hook JSON is valid"

  - id: RT-30
    type: file_exists
    target: docs/specs/retro-skill.md
    severity: warning
    desc: "Spec mirror exists for traceability"

  - id: RT-40
    type: file_exists
    target: skills/retro/scripts/validate-evals.py
    severity: error
    desc: "Eval validator script exists"

  - id: RT-41
    type: command
    pattern: "python3 -m py_compile skills/retro/scripts/validate-evals.py"
    severity: error
    desc: "Eval validator script is syntactically valid Python"

  - id: RT-42
    type: command
    pattern: "python3 skills/retro/scripts/validate-evals.py"
    severity: error
    desc: "Retro's own eval scenarios are present (>=5) and well-formed (id/trigger/expected/negative_expected)"
